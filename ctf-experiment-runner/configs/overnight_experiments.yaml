# Overnight Experiment Configuration
# ===================================
# Each experiment runs ALL challenges defined in run_experiment.py (vm0-vm10)
# To change which VMs run, edit CTF_CHALLENGES in scripts/run_experiment.py
#
# Available parameters:
#   name                       -> Experiment name (used for results folder)
#   chap_enabled               -> Enable CHAP protocol (true/false)
#   model_name                 -> LLM model identifier
#   chap_token_limit_base      -> CHAP token threshold base (only used if chap_enabled)
#   chap_token_limit_increment -> CHAP threshold increase per relay (only used if chap_enabled)
#   chap_auto_trigger          -> If true, auto-trigger relay on token limit; if false, agent must trigger manually (only used if chap_enabled)
#
# Fixed parameters (edit in scripts/run_experiment.py if needed):
#   MAX_ITERATIONS, MAX_COST, COMMAND_TIMEOUT, MAX_OUTPUT_LENGTH

# How many times to repeat EACH experiment config below

runs_per_config: 2

experiments:

    
  # Example: Baseline without CHAP (different model)
  - name: "extra-codexbaseline-arm"
    chap_enabled: false
    model_name: "openai/gpt-5.1-codex-mini"

  - name: "extra-chap-codex-arm"
    chap_enabled: true
    model_name: "openai/gpt-5.1-codex-mini"
    chap_token_limit_base: 30000
    chap_token_limit_increment: 1000
    chap_auto_trigger: true

 
